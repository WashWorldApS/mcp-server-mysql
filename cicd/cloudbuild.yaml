steps:
  # Run lint, build and tests with local MySQL (cam-style)
  - name: gcr.io/cloud-builders/docker
    id: Run tests with local MySQL
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        docker run -d \
          --name mysql-mcp-test \
          -e MYSQL_ROOT_PASSWORD=root_password \
          -e MYSQL_DATABASE=mcp_test \
          mysql:8.0 \
          --character-set-server=utf8mb4 \
          --collation-server=utf8mb4_0900_ai_ci \
          --default-authentication-plugin=mysql_native_password

        sleep 3
        if ! docker ps --filter name=mysql-mcp-test --filter status=running | grep -q mysql-mcp-test; then
          echo "ERROR: MySQL container failed to start!"
          docker logs mysql-mcp-test
          exit 1
        fi

        MYSQL_READY=0
        for i in {1..60}; do
          if docker exec mysql-mcp-test mysql -uroot -proot_password -e "SELECT 1;" 2>/dev/null; then
            echo "MySQL is ready!"
            MYSQL_READY=1
            break
          fi
          echo "Waiting for MySQL... ($$i/60)"
          sleep 2
        done

        if [ $$MYSQL_READY -ne 1 ]; then
          echo "ERROR: MySQL failed to become ready"
          docker logs mysql-mcp-test
          exit 1
        fi

        TEST_EXIT_CODE=0
        docker run --rm \
          --link mysql-mcp-test:mysql \
          -v $$(pwd):/workspace \
          -w /workspace \
          -e MYSQL_HOST=mysql \
          -e MYSQL_PORT=3306 \
          -e MYSQL_USER=root \
          -e MYSQL_PASS=root_password \
          -e MYSQL_DB= \
          -e ALLOW_INSERT_OPERATION=true \
          -e ALLOW_UPDATE_OPERATION=true \
          -e ALLOW_DELETE_OPERATION=true \
          -e ALLOW_DDL_OPERATION=true \
          -e MULTI_DB_WRITE_MODE=true \
          node:22-alpine \
          sh -c "
            apk add --no-cache git
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
            pnpm run lint:eslint
            pnpm run build
            pnpm run setup:test:db
            pnpm vitest run tests/unit
            pnpm vitest run tests/integration
          " || TEST_EXIT_CODE=$$?

        docker stop mysql-mcp-test
        docker rm mysql-mcp-test

        if [ $$TEST_EXIT_CODE -ne 0 ]; then
          echo "Tests failed with exit code $$TEST_EXIT_CODE"
          exit $$TEST_EXIT_CODE
        fi

        echo "All tests passed successfully!"

  # Build mcp-server-mysql image (tag = git commit short SHA)
  - name: gcr.io/cloud-builders/docker
    id: Build mcp-server-mysql image
    args:
      - build
      - -t
      - europe-west3-docker.pkg.dev/$PROJECT_ID/ar-mcp-server-mysql/mcp-server-mysql:$SHORT_SHA
      - -f
      - Dockerfile
      - .

  # Push mcp-server-mysql image
  - name: gcr.io/cloud-builders/docker
    id: Push mcp-server-mysql image
    args:
      - push
      - europe-west3-docker.pkg.dev/$PROJECT_ID/ar-mcp-server-mysql/mcp-server-mysql:$SHORT_SHA

options:
  dynamic_substitutions: true
  pool:
    name: projects/production-283206/locations/europe-west3/workerPools/default

